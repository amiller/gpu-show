<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Baseball — generated by llama.cpp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;color:#e6edf3;font:13px/1.4 'JetBrains Mono',Consolas,monospace}
#status{position:fixed;top:0;left:0;right:0;padding:8px 14px;background:rgba(13,17,23,0.85);border-bottom:1px solid #30363d;z-index:10;font-size:12px;color:#8b949e;transition:opacity 0.6s}
#status.fade{opacity:0.25}
#status:hover{opacity:1}
#status .stage{font-weight:bold;color:#58a6ff;text-transform:uppercase;letter-spacing:0.5px;margin-right:10px}
#status .err{color:#f85149}
#status .ok{color:#3fb950}
#status .elapsed{color:#6e7681;margin-left:8px}
#canvas{display:block;width:100%;height:100%}
#err-detail{position:fixed;left:0;right:0;bottom:0;max-height:50vh;overflow-y:auto;padding:10px 14px;background:#161b22;border-top:1px solid #f85149;color:#f85149;font-size:11px;white-space:pre-wrap;font-family:monospace;display:none;z-index:11}
#err-detail.show{display:block}
</style>
</head>
<body>
<div id="status"><span class="stage" id="stage">starting</span><span id="msg">…</span><span id="elapsed" class="elapsed"></span></div>
<canvas id="canvas"></canvas>
<div id="err-detail"></div>
<script>
const API = "http://10.141.207.1:8084/v1/chat/completions";
const MAX_RETRIES = 3;

const SYSPROMPT = `You are a senior game developer who writes complete, working WebGL2 mini-games as single self-contained JavaScript snippets. You favor clean game state in closures, hand-rolled matrix math (no libraries), simple low-poly geometry, readable shaders, and gameplay that works on the first try. You hate placeholder code, "// TODO" comments, half-built scenes, and snippets that throw on the first frame. Every game you write must be playable end-to-end immediately.`;

const SPEC = `Build a complete interactive baseball mini-game using WebGL2, in a single self-contained JavaScript snippet.

GAMEPLAY
- 3D view from behind home plate looking out at the field.
- A pitcher figure on the mound winds up and throws a ball toward the plate every few seconds.
- Player presses SPACE to swing the bat. Timing matters — early/late = miss, well-timed = hit.
- On hit: the ball arcs into the field with a trajectory based on swing timing and a small random spread. Classify the outcome by where it lands: foul, out (caught), single, double, triple, or home run.
- Track count: balls, strikes, outs. 3 strikes = out. 4 balls = walk. 3 outs = inning ends and the count resets.
- Track runs (starts at 0).
- R key resets everything.

VISUAL
- Stylized low-poly look — spheres, cylinders, boxes only. Bright readable palette.
- Visible field elements: home plate (white pentagon), three bases (1B/2B/3B as squares), pitcher's mound (raised disc), brown infield, green outfield, white foul lines.
- Rough humanoid figures for pitcher, batter, catcher — cylinders for body/legs, sphere for head, simple bat as a cylinder. Don't worry about realism, worry about readability.
- HUD overlay showing BALLS / STRIKES / OUTS / RUNS and the latest hit result text. Easiest way to do HUD: create a second \`<canvas>\` element via \`document.createElement('canvas')\`, position it absolutely on top of the main canvas with CSS, draw text on it with the 2D context, and update it from your draw loop. Add the class "game-overlay" to it so the harness can clean it up if needed.

TECHNICAL
- Use the full WebGL2 API freely: vertex/index buffers, attributes, uniforms, depth testing, perspective projection, vertex + fragment shaders. Use \`#version 300 es\` and \`precision highp float;\` in your fragment shader.
- Hand-roll a 4x4 matrix library inside your snippet (perspective, lookAt, translate, rotate, scale, multiply). It's only ~40 lines and you control it.
- All geometry built procedurally — generate cube/sphere/cylinder vertex+index buffers in JS at setup time.
- Self-contained: no external libraries, no fetches, no image loads, no asset files.

CONTRACT
Your code is invoked as: \`new Function('gl','canvas', yourCode)(gl, canvas)\`
- \`gl\` is a WebGL2 context already created on the main canvas.
- \`canvas\` is the main canvas element. It fills the window — read \`canvas.width\` / \`canvas.height\` for the viewport. The harness handles resize.
- Do ALL setup at the top level: compile shaders, build buffers, register key listeners with \`window.addEventListener\`, create the HUD overlay canvas, initialise game state in closure variables.
- End with: \`return function draw(t) { /* clear, update game state, render one frame, update HUD */ };\`
- The harness drives requestAnimationFrame and calls \`draw(t)\` every frame with t = seconds since start.
- DO NOT call requestAnimationFrame yourself — the harness owns the frame loop. State changes happen inside draw(t) using the t parameter.
- All game state lives in closure variables in your snippet's setup scope.

Reply EXACTLY in this format, nothing before or after:
TITLE: <short name>
SPEC: <one short paragraph describing the game's feel>
CODE:
\`\`\`js
<your complete JavaScript snippet>
\`\`\``;

const setStatus = (stage, msg, kind="") => {
  document.getElementById("stage").textContent = stage;
  const m = document.getElementById("msg");
  m.textContent = msg;
  m.className = kind;
};
const showErrDetail = (text) => {
  const el = document.getElementById("err-detail");
  el.textContent = text;
  el.classList.add("show");
};
const hideErrDetail = () => document.getElementById("err-detail").classList.remove("show");

function resizeCanvas() {
  const c = document.getElementById("canvas");
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let elapsedTimer = null;
function startElapsed() {
  const start = performance.now();
  const el = document.getElementById("elapsed");
  if (elapsedTimer) clearInterval(elapsedTimer);
  elapsedTimer = setInterval(() => {
    el.textContent = `(${((performance.now()-start)/1000).toFixed(1)}s)`;
  }, 100);
}
function stopElapsed() {
  if (elapsedTimer) clearInterval(elapsedTimer);
  elapsedTimer = null;
  document.getElementById("elapsed").textContent = "";
}

async function chat(messages, {temperature=0.7, max_tokens=8000} = {}) {
  const r = await fetch(API, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"test",
      messages:[{role:"system",content:SYSPROMPT},...messages],
      temperature, max_tokens,
      chat_template_kwargs:{enable_thinking:false},
    }),
  });
  if (!r.ok) throw new Error(`http ${r.status}: ${await r.text()}`);
  const j = await r.json();
  const m = j.choices?.[0]?.message || {};
  return (m.content || m.reasoning_content || "").trim();
}

function parseReply(text) {
  const titleM = text.match(/TITLE:\s*(.+)/i);
  const specM  = text.match(/SPEC:\s*([\s\S]+?)(?=\n\s*CODE:|\n\s*```)/i);
  let code = "";
  const codeM = text.match(/```(?:js|javascript)?\s*([\s\S]+?)```/);
  if (codeM) code = codeM[1];
  else {
    const tail = text.match(/CODE:\s*([\s\S]+)$/i);
    if (tail) code = tail[1];
  }
  return {
    title: (titleM?.[1] || "untitled").trim(),
    spec:  (specM?.[1]  || "").trim(),
    code:  code.trim(),
  };
}

let currentDraw = null;
const PAGE_LOAD = performance.now();

function tryRun(canvas, code) {
  document.querySelectorAll(".game-overlay").forEach(el => el.remove());
  const gl = canvas.getContext("webgl2", {antialias:true, preserveDrawingBuffer:false});
  if (!gl) return {ok:false, err:"webgl2 not available"};
  let draw;
  try {
    const fn = new Function("gl", "canvas", code);
    const result = fn(gl, canvas);
    if (typeof result !== "function") {
      return {ok:false, err:"snippet did not return a draw(t) function — returned "+typeof result};
    }
    draw = result;
  } catch (e) {
    return {ok:false, err:"setup: "+(e.message || String(e))+(e.stack ? "\n"+e.stack.split("\n").slice(0,4).join("\n") : "")};
  }
  try {
    gl.viewport(0, 0, canvas.width, canvas.height);
    draw(0);
  } catch (e) {
    return {ok:false, err:"draw(0): "+(e.message || String(e))};
  }
  const glErr = gl.getError();
  if (glErr !== gl.NO_ERROR) {
    return {ok:false, err:"gl.getError=0x"+glErr.toString(16)+" after draw(0)"};
  }
  return {ok:true, gl, draw};
}

function tick() {
  if (currentDraw) {
    const t = (performance.now() - PAGE_LOAD) / 1000;
    try { currentDraw(t); }
    catch (e) {
      console.error("draw threw:", e);
      currentDraw = null;
      setStatus("crash", "draw() threw at runtime — see error below", "err");
      showErrDetail(String(e.stack || e));
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

async function main() {
  setStatus("requesting", "asking llama.cpp to write a baseball game…");
  startElapsed();
  const messages = [{role:"user", content: SPEC}];
  let attempt = 0;
  while (attempt <= MAX_RETRIES) {
    let raw;
    try {
      raw = await chat(messages);
    } catch (e) {
      stopElapsed();
      setStatus("network", String(e), "err");
      return;
    }
    const parsed = parseReply(raw);
    if (!parsed.code) {
      attempt++;
      if (attempt > MAX_RETRIES) {
        stopElapsed();
        setStatus("parse-fail", "no code in any reply", "err");
        showErrDetail(raw.slice(0, 3000));
        return;
      }
      messages.push({role:"assistant", content: raw});
      messages.push({role:"user", content: "Your reply had no parseable code block. Reply in the EXACT TITLE/SPEC/CODE format with the code inside a fenced ```js block."});
      setStatus("retry "+attempt, "no code parsed, asking again…");
      continue;
    }
    setStatus("compiling", `"${parsed.title}" — ${parsed.code.length} chars`);
    const canvas = document.getElementById("canvas");
    const r = tryRun(canvas, parsed.code);
    if (r.ok) {
      stopElapsed();
      currentDraw = r.draw;
      setStatus("playing", `${parsed.title} — ${parsed.spec.slice(0,100)}`, "ok");
      hideErrDetail();
      setTimeout(() => document.getElementById("status").classList.add("fade"), 4000);
      return;
    }
    attempt++;
    if (attempt > MAX_RETRIES) {
      stopElapsed();
      setStatus("failed", `${MAX_RETRIES} retries exhausted: ${r.err.slice(0,80)}`, "err");
      showErrDetail(r.err + "\n\n--- last code (first 4000 chars) ---\n" + parsed.code.slice(0, 4000));
      return;
    }
    messages.push({role:"assistant", content: raw});
    messages.push({role:"user", content: `Your snippet failed:\n${r.err}\n\nFix it and reply again in the same TITLE/SPEC/CODE format. Remember: do all setup at the top level, return a draw(t) function, do not call requestAnimationFrame yourself.`});
    setStatus("retry "+attempt, `failed: ${r.err.slice(0,80)}`, "err");
  }
}

main();
</script>
</body>
</html>
