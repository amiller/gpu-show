<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPU Show</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font:14px/1.5 'JetBrains Mono',Consolas,monospace;padding:16px}
header{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
h1{font-size:18px;color:#58a6ff}
.dot{width:10px;height:10px;border-radius:50%;background:#666;display:inline-block;margin-right:6px}
.dot.live{background:#3fb950;box-shadow:0 0 8px #3fb950}
.btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 16px;border-radius:6px;cursor:pointer;font:13px monospace}
.btn:hover{background:#30363d}
.btn.go{background:#238636;border-color:#2ea043}
.btn.stop{background:#a40e26;border-color:#da3633}
.status{color:#8b949e;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.card video{width:100%;display:block;background:#000}
.meta{padding:10px 12px;font-size:12px}
.meta .name{font-size:14px;color:#58a6ff;font-weight:bold;margin-bottom:4px}
.meta .stats{color:#8b949e;display:flex;gap:10px;flex-wrap:wrap}
.meta .pass{color:#3fb950}
.meta .fail{color:#f85149}
.meta .actions{margin-top:6px;color:#6e7681;font-size:11px;max-height:60px;overflow-y:auto}
.meta .actions div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .spec{color:#8b949e;font-size:11px;margin:4px 0 6px;font-style:italic;line-height:1.4;max-height:48px;overflow:hidden}
.empty{color:#6e7681;text-align:center;padding:60px}
.logs{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;margin-top:14px;font-size:11px;color:#8b949e;max-height:160px;overflow-y:auto;display:none}
.logs.show{display:block}
.steer{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px}
.steer.active{border-color:#bc8cff;box-shadow:0 0 0 1px #bc8cff inset}
.steer label{color:#8b949e;font-size:12px}
.steer input{flex:1;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:6px 10px;border-radius:6px;font:13px monospace;outline:none}
.steer input:focus{border-color:#58a6ff}
.steer.active label{color:#bc8cff}
.live{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:#8b949e;display:flex;gap:14px;align-items:center;flex-wrap:wrap;min-height:34px}
.live .stage{font-weight:bold;color:#58a6ff;text-transform:uppercase;font-size:11px;letter-spacing:0.5px}
.live .stage.gen{color:#bc8cff}
.live .stage.exec{color:#3fb950}
.live .stage.enc{color:#d29922}
.live .stage.idle{color:#6e7681}
.live .stage.err{color:#f85149}
.live .pill{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:2px 10px;font-size:11px}
.live .pill.steer-pill{border-color:#bc8cff;color:#bc8cff}
.meta .steer-chip{display:inline-block;background:#0d1117;border:1px solid #bc8cff;color:#bc8cff;font-size:10px;padding:1px 8px;border-radius:10px;margin-top:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
</style>
</head>
<body>
<header>
  <h1>GPU Show</h1>
  <span><span id="dot" class="dot"></span><span id="state" class="status">unknown</span></span>
  <button id="startBtn" class="btn go" onclick="start()">Start</button>
  <button id="stopBtn" class="btn stop" onclick="stop()">Stop</button>
  <button class="btn" onclick="clearAll()">Clear</button>
  <button class="btn" onclick="toggleLogs()">Logs</button>
  <span class="status">model:</span>
  <select id="modelSel" class="btn" onchange="switchModel()"></select>
  <span class="status">show:</span>
  <select id="limitSel" class="btn" onchange="refresh()">
    <option value="4">last 4</option>
    <option value="8">last 8</option>
    <option value="16">last 16</option>
    <option value="50">all (50)</option>
  </select>
  <span id="counter" class="status"></span>
</header>
<div class="steer">
  <label>steer next prompt:</label>
  <input id="steerInput" type="text" placeholder="e.g. underwater bioluminescence, retro arcade, MC Escher tessellations… (auto-saves)" maxlength="500" oninput="onSteerInput()">
  <button class="btn" onclick="clearSteering()">×</button>
  <span id="steerStatus" class="status"></span>
</div>
<div id="liveState" class="live"></div>
<div id="logs" class="logs"></div>
<div id="grid" class="grid"></div>

<script>
async function api(path, method='GET') {
  const r = await fetch(path, {method});
  return r.json();
}

async function refresh() {
  const s = await api('/api/status');
  document.getElementById('dot').className = 'dot' + (s.running ? ' live' : '');
  document.getElementById('state').textContent = s.running ? `running (pid ${s.pid})` : 'idle';
  renderLive(s);

  const v = await api('/api/videos');
  const grid = document.getElementById('grid');
  const limit = parseInt(document.getElementById('limitSel').value);
  document.getElementById('counter').textContent = `${v.videos.length} stored`;
  if (!v.videos.length) {
    grid.innerHTML = '<div class="empty">No videos yet — click Start to begin.</div>';
    return;
  }
  grid.innerHTML = v.videos.slice(0, limit).map(item => {
    const date = new Date(item.ts*1000).toLocaleTimeString();
    const cls = item.passed ? 'pass' : 'fail';
    const tag = item.passed ? 'PASS' : 'FAIL';
    const title = item.title || item.name || '?';
    const acts = (item.actions || []).map(a => `<div>$ ${escapeHtml(a)}</div>`).join('');
    const video = item.video
      ? `<video src="/videos/${item.video}" autoplay loop muted playsinline></video>`
      : '<div style="padding:40px;text-align:center;color:#6e7681">no render</div>';
    const spec = item.spec ? `<div class="spec">${escapeHtml(item.spec)}</div>` : '';
    const steerChip = item.steering ? `<div><span class="steer-chip" title="steered toward: ${escapeHtml(item.steering)}">↗ ${escapeHtml(item.steering)}</span></div>` : '';
    return `<div class="card">
      ${video}
      <div class="meta">
        <div class="name">${escapeHtml(title)} <span class="${cls}">[${tag}]</span></div>
        ${steerChip}
        ${spec}
        <div class="stats">
          <span>${item.elapsed}s</span>
          <span>${item.tool_calls} calls</span>
          <span>${item.errors} errs</span>
          <span>${item.n_frames || 0}f</span>
          <span>${date}</span>
        </div>
        <div class="actions">${acts}</div>
      </div>
    </div>`;
  }).join('');
}

function renderLive(s) {
  const el = document.getElementById('liveState');
  if (!s.running) {
    el.innerHTML = '<span class="stage idle">runner stopped</span>';
    return;
  }
  const st = s.state || {};
  const stage = st.stage || 'idle';
  const stageClass = {
    'generating': 'gen', 'executing': 'exec', 'encoding': 'enc',
    'idle': 'idle', 'waiting_for_model': 'idle', 'error': 'err', 'stopped': 'idle'
  }[stage] || 'idle';
  const stageLabel = {
    'generating': '🧠 inventing prompt',
    'executing': '⚙️ running task',
    'encoding': '🎬 encoding video',
    'waiting_for_model': '⏳ waiting for model',
    'idle': '✓ ready for next',
    'stopped': 'stopped',
    'error': '⚠ error',
  }[stage] || stage;
  let extras = '';
  if (st.title) extras += `<span class="pill">${escapeHtml(st.title)}</span>`;
  if (st.steering) extras += `<span class="pill steer-pill">↗ ${escapeHtml(st.steering)}</span>`;
  if (st.model) extras += `<span class="pill">${escapeHtml(st.model)}</span>`;
  if (st.n_frames) extras += `<span class="pill">${st.n_frames} frames</span>`;
  if (st.error) extras += `<span class="pill" style="color:#f85149">${escapeHtml(st.error)}</span>`;
  el.innerHTML = `<span class="stage ${stageClass}">${stageLabel}</span>${extras}`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function start() { await api('/api/start', 'POST'); refresh(); }
async function stop() { await api('/api/stop', 'POST'); refresh(); }
async function clearAll() { await api('/api/clear', 'POST'); refresh(); }

function setSteerVisual(text, label) {
  const box = document.querySelector('.steer');
  const st = document.getElementById('steerStatus');
  if (text.trim()) {
    box.classList.add('active');
    st.textContent = label || '↗ active — applies to NEXT new prompt';
  } else {
    box.classList.remove('active');
    st.textContent = label || '';
  }
}

async function loadSteering() {
  const r = await api('/api/steering');
  const inp = document.getElementById('steerInput');
  if (document.activeElement !== inp) inp.value = r.text || '';
  setSteerVisual(r.text || '');
}

let steerTimer = null;
function onSteerInput() {
  if (steerTimer) clearTimeout(steerTimer);
  setSteerVisual(document.getElementById('steerInput').value, 'typing…');
  steerTimer = setTimeout(saveSteering, 600);
}

async function saveSteering() {
  const text = document.getElementById('steerInput').value;
  setSteerVisual(text, 'saving…');
  await fetch('/api/steering', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text})});
  setSteerVisual(text, text.trim() ? '✓ saved — applies to next NEW prompt' : '✓ cleared');
  setTimeout(() => setSteerVisual(text), 2500);
}

async function clearSteering() {
  document.getElementById('steerInput').value = '';
  await saveSteering();
}

async function loadModels() {
  const m = await api('/api/models');
  const sel = document.getElementById('modelSel');
  sel.innerHTML = m.models.map(x =>
    `<option value="${x.id}" ${x.id===m.current?'selected':''}>${x.label}</option>`
  ).join('');
  sel.dataset.current = m.current || '';
}

async function switchModel() {
  const sel = document.getElementById('modelSel');
  const target = sel.value;
  if (target === sel.dataset.current) return;
  sel.disabled = true;
  const orig = sel.options[sel.selectedIndex].textContent;
  sel.options[sel.selectedIndex].textContent = '⏳ switching...';
  try {
    await fetch(`/api/model/${target}`, {method:'POST'});
  } finally {
    sel.options[sel.selectedIndex].textContent = orig;
    sel.disabled = false;
    loadModels();
  }
}

async function refreshLogs() {
  const l = await api('/api/logs');
  document.getElementById('logs').innerHTML = l.lines.map(escapeHtml).join('<br>');
}

function toggleLogs() {
  const el = document.getElementById('logs');
  el.classList.toggle('show');
  if (el.classList.contains('show')) refreshLogs();
}

loadModels();
loadSteering();
refresh();
setInterval(refresh, 4000);
setInterval(loadModels, 10000);
setInterval(() => {
  if (document.getElementById('logs').classList.contains('show')) refreshLogs();
}, 4000);
</script>
</body>
</html>
